<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ana Sayfa - Smoke-storycap</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#bdffdb",
                        "on-tertiary-fixed": "#002113",
                        "surface-tint": "#0053db",
                        "surface-container-highest": "#d3e4fe",
                        "on-secondary-container": "#394c84",
                        "secondary-fixed": "#dbe1ff",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "inverse-primary": "#b4c5ff",
                        "on-primary": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "on-error": "#ffffff",
                        "on-surface": "#0b1c30",
                        "outline-variant": "#c3c6d7",
                        "inverse-surface": "#213145",
                        "secondary-container": "#acbfff",
                        "inverse-on-surface": "#eaf1ff",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "surface": "#f8f9ff",
                        "surface-dim": "#cbdbf5",
                        "surface-container-low": "#eff4ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "background": "#f8f9ff",
                        "secondary": "#495c95",
                        "primary": "#004ac6",
                        "on-background": "#0b1c30",
                        "on-primary-fixed": "#00174b",
                        "secondary-fixed-dim": "#b4c5ff",
                        "tertiary-fixed": "#6ffbbe",
                        "on-primary-container": "#eeefff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#005236",
                        "surface-bright": "#f8f9ff",
                        "on-surface-variant": "#434655",
                        "primary-fixed-dim": "#b4c5ff",
                        "tertiary-container": "#007d55",
                        "on-secondary-fixed-variant": "#31447b",
                        "surface-container": "#e5eeff",
                        "tertiary-fixed-dim": "#4edea3",
                        "tertiary": "#006242",
                        "outline": "#737686",
                        "on-secondary-fixed": "#00174b",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    "fontFamily": {
                        "headline": ["Inter"],
                        "display": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#F8F9FF] dark:bg-[#0B1C30] text-[#004AC6] dark:text-[#2563EB] font-['Inter'] font-bold tracking-tight text-[1.75rem] font-bold text-[#0B1C30] dark:text-[#FFFFFF] docked full-width top-0 bg-[#EFF4FF] dark:bg-[#1A2B40] h-[1px] flat no shadows text-[#004AC6] font-bold text-[#5A6C80] hover:bg-[#EFF4FF] dark:hover:bg-[#1A2B40] transition-colors scale-95 active:scale-90 transition-transform flex justify-between items-center w-full px-6 py-4 sticky z-50">
<div class="flex items-center gap-4">
<span class="text-[1.75rem] font-bold text-[#0B1C30] dark:text-[#FFFFFF]">Smoke-storycap</span>
</div>
<div class="flex items-center gap-4">
<button class="hover:bg-[#EFF4FF] dark:hover:bg-[#1A2B40] transition-colors rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center p-6 bg-surface-container-low mb-24 md:mb-0">
<!-- The Precision Ledger Counter Card -->
<div class="bg-surface-container-lowest rounded-[1.5rem] w-full max-w-md p-10 flex flex-col items-center gap-12">
<!-- Display Header -->
<h1 class="text-title-md font-medium text-on-surface">Günlük Sayaç</h1>
<!-- The Counter Digit -->
<div class="text-[4rem] font-extrabold text-on-surface leading-none tracking-tighter">
                42
            </div>
<!-- Action Buttons Group -->
<div class="flex flex-col w-full gap-4">
<!-- Primary Action: Artır -->
<button class="flex items-center justify-center gap-2 w-full py-4 px-6 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-medium text-label-md uppercase tracking-wider hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="add" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;">add</span>
                    ARTIR
                </button>
<!-- Secondary Action: Azalt -->
<button class="flex items-center justify-center gap-2 w-full py-4 px-6 rounded-xl bg-secondary-container text-on-secondary-container font-medium text-label-md uppercase tracking-wider hover:bg-surface-dim active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="remove" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;">remove</span>
                    AZALT
                </button>
<!-- Tertiary Action: Sıfırla -->
<button class="flex items-center justify-center gap-2 w-full mt-4 py-4 px-6 rounded-xl bg-tertiary text-on-tertiary font-medium text-label-md uppercase tracking-wider hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="refresh" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;">refresh</span>
                    SIFIRLA
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden bg-[#FFFFFF] dark:bg-[#0B1C30] text-[#004AC6] dark:text-[#2563EB] font-['Inter'] font-medium text-[0.75rem] uppercase tracking-wider hidden fixed bottom-0 w-full z-50 rounded-t-3xl tonal-shift-from-background shadow-[0_-4px_20px_0_rgba(0,0,0,0.05)] flex flex-col items-center justify-center bg-[#EFF4FF] dark:bg-[#2563EB]/20 text-[#004AC6] dark:text-[#2563EB] rounded-2xl px-5 py-2 flex flex-col items-center justify-center text-[#5A6C80] dark:text-[#C3C6D7] px-5 py-2 hover:opacity-80 transition-opacity scale-98 active:scale-95 transition-all fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4">
<button class="flex flex-col items-center justify-center bg-[#EFF4FF] dark:bg-[#2563EB]/20 text-[#004AC6] dark:text-[#2563EB] rounded-2xl px-5 py-2 hover:opacity-80 transition-opacity scale-98 active:scale-95 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="counter_4">counter_4</span>
<span class="text-[0.75rem] uppercase tracking-wider font-medium">Sayaç</span>
</button>
<button class="flex flex-col items-center justify-center text-[#5A6C80] dark:text-[#C3C6D7] px-5 py-2 hover:opacity-80 transition-opacity scale-98 active:scale-95 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="text-[0.75rem] uppercase tracking-wider font-medium">Geçmiş</span>
</button>
<button class="flex flex-col items-center justify-center text-[#5A6C80] dark:text-[#C3C6D7] px-5 py-2 hover:opacity-80 transition-opacity scale-98 active:scale-95 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="text-[0.75rem] uppercase tracking-wider font-medium">Ayarlar</span>
</button>
</nav>
</body></html>
