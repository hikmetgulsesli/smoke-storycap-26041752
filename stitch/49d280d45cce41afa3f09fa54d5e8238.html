<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smoke-storycap - Hata Durumu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#bdffdb",
                        "on-tertiary-fixed": "#002113",
                        "surface-tint": "#0053db",
                        "surface-container-highest": "#d3e4fe",
                        "on-secondary-container": "#394c84",
                        "secondary-fixed": "#dbe1ff",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "inverse-primary": "#b4c5ff",
                        "on-primary": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "on-error": "#ffffff",
                        "on-surface": "#0b1c30",
                        "outline-variant": "#c3c6d7",
                        "inverse-surface": "#213145",
                        "secondary-container": "#acbfff",
                        "inverse-on-surface": "#eaf1ff",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "surface": "#f8f9ff",
                        "surface-dim": "#cbdbf5",
                        "surface-container-low": "#eff4ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "background": "#f8f9ff",
                        "secondary": "#495c95",
                        "primary": "#004ac6",
                        "on-background": "#0b1c30",
                        "on-primary-fixed": "#00174b",
                        "secondary-fixed-dim": "#b4c5ff",
                        "tertiary-fixed": "#6ffbbe",
                        "on-primary-container": "#eeefff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#005236",
                        "surface-bright": "#f8f9ff",
                        "on-surface-variant": "#434655",
                        "primary-fixed-dim": "#b4c5ff",
                        "tertiary-container": "#007d55",
                        "on-secondary-fixed-variant": "#31447b",
                        "surface-container": "#e5eeff",
                        "tertiary-fixed-dim": "#4edea3",
                        "tertiary": "#006242",
                        "outline": "#737686",
                        "on-secondary-fixed": "#00174b",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "display": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="bg-[#F8F9FF] fixed top-0 w-full z-40">
<div class="flex justify-between items-center w-full px-6 py-4">
<h1 class="text-[1.75rem] font-bold text-[#0B1C30] tracking-tight font-['Inter']">Smoke-storycap</h1>
<div class="flex gap-4 items-center">
<button aria-label="settings" class="text-[#004AC6] scale-95 active:scale-90 transition-transform hover:bg-[#EFF4FF] rounded-full p-2">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</div>
<div class="bg-[#EFF4FF] h-[1px] w-full"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pt-24 pb-32">
<!-- Nested Depth Architecture: Low Container -->
<div class="bg-surface-container-low rounded-[1.5rem] p-4 w-full max-w-sm relative">
<!-- Lowest Container: The Hero Card -->
<div class="bg-surface-container-lowest rounded-[1rem] p-8 flex flex-col items-center relative shadow-sm">
<!-- Subtle Error Indicator -->
<div class="absolute top-4 right-4 flex items-center gap-1 text-outline-variant" title="Yerel bellek erişilemiyor, geçici oturum">
<span class="material-symbols-outlined text-[1rem]" data-icon="cloud_off">cloud_off</span>
</div>
<div class="text-center mb-8 mt-4">
<span class="text-label-md uppercase tracking-[0.05em] text-on-surface-variant font-medium">Günlük Sayaç</span>
</div>
<!-- Display Value -->
<div class="font-display text-[3.5rem] font-[800] text-on-surface leading-none mb-12 tracking-tighter">
                    -5
                </div>
<!-- Controls -->
<div class="flex flex-col gap-4 w-full">
<div class="flex gap-4 justify-between w-full">
<button class="flex-1 bg-secondary-container text-on-secondary-container rounded-xl py-4 flex items-center justify-center gap-2 hover:opacity-90 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-[1.25rem]" data-icon="remove">remove</span>
<span class="font-label text-[0.75rem] font-medium uppercase tracking-[0.05em]">Azalt</span>
</button>
<button class="flex-[1.5] bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-xl py-4 flex items-center justify-center gap-2 shadow-[0_4px_12px_rgba(0,74,198,0.2)] hover:opacity-95 transition-all active:scale-95">
<span class="material-symbols-outlined text-[1.25rem]" data-icon="add">add</span>
<span class="font-label text-[0.75rem] font-medium uppercase tracking-[0.05em]">Artır</span>
</button>
</div>
<button class="w-full bg-surface text-tertiary-container rounded-xl py-3 mt-2 flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors active:scale-95 border border-outline-variant/20">
<span class="material-symbols-outlined text-[1.125rem]" data-icon="restart_alt">restart_alt</span>
<span class="font-label text-[0.75rem] font-medium uppercase tracking-[0.05em]">Sıfırla</span>
</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-[#FFFFFF] fixed bottom-0 left-0 w-full z-50 rounded-t-3xl shadow-[0_-4px_20px_0_rgba(0,0,0,0.05)] md:hidden">
<div class="flex justify-around items-center px-4 pb-8 pt-4 w-full">
<!-- Active Item: Sayaç -->
<button class="flex flex-col items-center justify-center bg-[#EFF4FF] text-[#004AC6] rounded-2xl px-5 py-2 scale-98 active:scale-95 transition-all hover:opacity-80">
<span class="material-symbols-outlined icon-fill" data-icon="counter_4" data-weight="fill">counter_4</span>
<span class="font-['Inter'] font-medium text-[0.75rem] uppercase tracking-wider mt-1">Sayaç</span>
</button>
<!-- Inactive Item: Geçmiş -->
<button class="flex flex-col items-center justify-center text-[#5A6C80] px-5 py-2 scale-98 active:scale-95 transition-all hover:opacity-80">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] font-medium text-[0.75rem] uppercase tracking-wider mt-1">Geçmiş</span>
</button>
<!-- Inactive Item: Ayarlar -->
<button class="flex flex-col items-center justify-center text-[#5A6C80] px-5 py-2 scale-98 active:scale-95 transition-all hover:opacity-80">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] font-medium text-[0.75rem] uppercase tracking-wider mt-1">Ayarlar</span>
</button>
</div>
</nav>
</body></html>
